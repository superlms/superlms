name: Deploy

# PRs + pushes run `validate` (fast, no secrets, no infra).
# Only pushes to main, with `validate` green, proceed to `deploy` (build ARM64
# image -> push to ECR -> roll the ECS services -> run migrations).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # JOB 1 — VALIDATE  (catches deploy-blocking bugs before we build/ship)
  # ──────────────────────────────────────────────────────────────────────
  validate:
    name: Validate (autoload, routes, views, migrations, assets)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootsecret
          MYSQL_DATABASE: lms_superlms
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -prootsecret"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: bcmath, exif, gd, intl, mbstring, pdo_mysql, redis, zip, pcntl
          tools: composer:v2
          coverage: none

      - name: Setup Node 20 (matches Dockerfile assets stage)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: PHP syntax lint (php -l)
        run: |
          set -e
          find app bootstrap config database routes tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /tmp/lint.log 2>&1 \
            || (grep -v 'No syntax errors' /tmp/lint.log; exit 1)
          echo "All PHP files lint clean."

      - name: Guard against PHP files without class declarations
        run: |
          set -e
          missing=$(
            find app -type f -name '*.php' -print0 \
              | xargs -0 -I{} sh -c '
                  if ! grep -qE "^\s*(class|interface|trait|enum|abstract class|final class)\s" "$1"; then
                    echo "$1"
                  fi
                ' _ {}
          )
          if [ -n "$missing" ]; then
            echo "::error::These files under app/ have no class/interface/trait/enum declaration:"
            echo "$missing"
            exit 1
          fi
          echo "All files under app/ declare a class-like symbol."

      - name: Composer install (no-dev, prod-like)
        run: |
          composer install --no-dev --no-interaction --no-progress \
            --prefer-dist --optimize-autoloader --no-scripts

      - name: Strict PSR-4 + classmap-authoritative (mirrors Dockerfile)
        run: |
          composer dump-autoload --optimize --classmap-authoritative --strict-psr --no-scripts

      - name: Build front-end assets (npm ci + vite build)
        run: |
          npm ci
          npm run build
          test -f public/build/manifest.json
          echo "Vite manifest produced."

      - name: Prepare .env for CI run
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=lms_superlms/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=rootsecret/' .env
          sed -i 's/^CACHE_STORE=.*/CACHE_STORE=file/' .env
          sed -i 's/^SESSION_DRIVER=.*/SESSION_DRIVER=file/' .env
          sed -i 's/^QUEUE_CONNECTION=.*/QUEUE_CONNECTION=sync/' .env
          php artisan key:generate --force --no-interaction

      - name: artisan config:cache (catches env() usage outside config files)
        run: php artisan config:cache
      - name: artisan view:cache (catches Blade compile errors)
        run: php artisan view:cache
      - name: artisan migrate (real MySQL)
        run: php artisan migrate --force --no-interaction
      - name: artisan lms:migrate (schema-drift command)
        run: php artisan lms:migrate --no-interaction
      - name: artisan route:list (catches invalid route actions)
        run: |
          php artisan route:list --no-ansi >/dev/null
          echo "All routes resolved."

  # ──────────────────────────────────────────────────────────────────────
  # JOB 2 — DEPLOY  (build ARM64 -> ECR -> ECS rolling deploy -> migrate)
  # Auth is via GitHub OIDC assuming AWS_DEPLOY_ROLE_ARN — no stored AWS keys.
  # ──────────────────────────────────────────────────────────────────────
  deploy:
    name: Build, push, and deploy to ECS
    needs: validate
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest       # native amd64 -> matches the x86_64 ECS task defs
    timeout-minutes: 30
    environment: production
    permissions:
      id-token: write            # required for OIDC
      contents: read
    env:
      AWS_REGION: ap-south-1
      ECR_REPO: superlms-app
      ECS_STACK: superlms-ecs
      CLUSTER: superlms

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image (linux/amd64)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -e
          IMAGE="$REGISTRY/$ECR_REPO"
          SHA="${GITHUB_SHA::12}"
          docker build --platform linux/amd64 --target runtime -t "$IMAGE:$SHA" -t "$IMAGE:latest" .
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"
          echo "IMAGE_TAG=$SHA" >> "$GITHUB_ENV"

      # ECS-native deploy (no CloudFormation): for each role, take the current
      # task definition, swap in the new image, register a new revision, then
      # point the service at it. Infra itself is managed separately by the infra
      # scripts - CI only ships the new image. Needs only ECS + PassRole perms.
      - name: Register new task defs + roll services
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -e
          IMAGE="$REGISTRY/$ECR_REPO:$IMAGE_TAG"
          for fam in superlms-web superlms-worker superlms-scheduler superlms-migrate; do
            aws ecs describe-task-definition --task-definition "$fam" --query taskDefinition > /tmp/td.json
            jq --arg IMG "$IMAGE" '
              .containerDefinitions[0].image = $IMG
              | {family, taskRoleArn, executionRoleArn, networkMode, containerDefinitions,
                 requiresCompatibilities, cpu, memory, runtimePlatform}
            ' /tmp/td.json > /tmp/$fam.json
            aws ecs register-task-definition --cli-input-json file:///tmp/$fam.json >/dev/null
            echo "registered $fam -> $IMAGE"
          done
          for svc in superlms-web superlms-worker superlms-scheduler; do
            aws ecs update-service --cluster "$CLUSTER" --service "$svc" \
              --task-definition "$svc" --force-new-deployment >/dev/null
            echo "updated service $svc"
          done

      # One-off migrate task on the new image (network copied from the web service).
      # Assumes backward-compatible migrations.
      - name: Run DB migrations (one-off task)
        run: |
          set -e
          NETCFG=$(aws ecs describe-services --cluster "$CLUSTER" --services superlms-web \
            --query "services[0].networkConfiguration" --output json)
          TASK=$(aws ecs run-task --cluster "$CLUSTER" --task-definition superlms-migrate \
            --launch-type FARGATE --network-configuration "$NETCFG" \
            --query "tasks[0].taskArn" --output text)
          echo "migrate task: $TASK"
          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK"
          CODE=$(aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$TASK" \
            --query "tasks[0].containers[0].exitCode" --output text)
          echo "migrate exit code: $CODE"
          test "$CODE" = "0"

      - name: Wait for web service to stabilize
        run: aws ecs wait services-stable --cluster "$CLUSTER" --services superlms-web
