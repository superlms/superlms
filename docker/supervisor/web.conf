# WEB role — runs nginx + php-fpm together in ONE container.
# This is the only role that uses supervisor. The worker and scheduler
# roles run a single artisan process each (ECS command override), so they
# do NOT use this file:
#   worker     -> php artisan queue:work ...
#   scheduler  -> php artisan schedule:work        (always exactly 1 task)
#   migrate    -> php artisan migrate (one-off task)
[supervisord]
nodaemon=true
user=root
logfile=/dev/stdout
logfile_maxbytes=0
pidfile=/var/run/supervisord.pid

[program:php-fpm]
command=php-fpm -F
autostart=true
autorestart=true
priority=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
priority=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
