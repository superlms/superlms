AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  superlms email DNS (Phase 12). Replicates the existing Hostinger + ZeptoMail
  records into Route53 so email keeps working after the nameserver switch.
  Deploy right after the hosted zone, BEFORE switching nameservers.
  (Web root/www + cdn live in records.yaml; the old A @ 2.57.91.91 and the
  www CNAME are intentionally NOT copied - those move to the ALB/CloudFront.)

Resources:
  Mx:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: superlms.in.
      Type: MX
      TTL: "3600"
      ResourceRecords:
        - "5 mx1.hostinger.com"
        - "10 mx2.hostinger.com"

  Spf:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: superlms.in.
      Type: TXT
      TTL: "3600"
      ResourceRecords:
        - '"v=spf1 include:_spf.mail.hostinger.com ~all"'

  Dmarc:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: _dmarc.superlms.in.
      Type: TXT
      TTL: "3600"
      ResourceRecords:
        - '"v=DMARC1; p=none"'

  DkimA:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: hostingermail-a._domainkey.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["hostingermail-a.dkim.mail.hostinger.com"]

  DkimB:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: hostingermail-b._domainkey.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["hostingermail-b.dkim.mail.hostinger.com"]

  DkimC:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: hostingermail-c._domainkey.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["hostingermail-c.dkim.mail.hostinger.com"]

  Autodiscover:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: autodiscover.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["autodiscover.mail.hostinger.com"]

  Autoconfig:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: autoconfig.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["autoconfig.mail.hostinger.com"]

  BounceZem:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !ImportValue superlms-zone-id
      Name: bounce-zem.superlms.in.
      Type: CNAME
      TTL: "3600"
      ResourceRecords: ["cluster89.zeptomail.in"]
