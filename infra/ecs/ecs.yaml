            - { Name: LOG_LEVEL, Value: info }
            - { Name: DB_CONNECTION, Value: mysql }
            - { Name: DB_HOST, Value: !ImportValue superlms-db-host }
            - { Name: DB_PORT, Value: "3306" }
            - { Name: DB_DATABASE, Value: !ImportValue superlms-db-name }
            - { Name: SESSION_DRIVER, Value: redis }
            - { Name: SESSION_LIFETIME, Value: "120" }
            - { Name: QUEUE_CONNECTION, Value: redis }
            - { Name: CACHE_STORE, Value: redis }
            - { Name: REDIS_CLIENT, Value: phpredis }
            - { Name: REDIS_HOST, Value: !ImportValue superlms-redis-host }
            - { Name: REDIS_PORT, Value: "6379" }
            - { Name: FILESYSTEM_DISK, Value: s3 }
            - { Name: AWS_DEFAULT_REGION, Value: ap-south-1 }
            - { Name: AWS_BUCKET, Value: !ImportValue superlms-media-bucket }
            - { Name: AWS_URL, Value: !Sub ["https://${D}", { D: !ImportValue superlms-cdn-domain }] }
            - { Name: AWS_USE_PATH_STYLE_ENDPOINT, Value: "false" }
            - { Name: ZEPTOMAIL_API_URL, Value: https://api.zeptomail.in/v1.1 }
            - { Name: ZEPTOMAIL_FROM_EMAIL, Value: noreply@superlms.in }
            - { Name: ZEPTOMAIL_FROM_NAME, Value: SuperLMS }
            - { Name: PHONEPE_CLIENT_VERSION, Value: "1" }
            - { Name: PHONEPE_ENV, Value: production }
            - { Name: RUN_MIGRATIONS, Value: "false" }
          Secrets:
            - { Name: DB_USERNAME, ValueFrom: !Sub ["${A}:username::", { A: !ImportValue superlms-db-secret-arn }] }
            - { Name: DB_PASSWORD, ValueFrom: !Sub ["${A}:password::", { A: !ImportValue superlms-db-secret-arn }] }
            - { Name: APP_KEY, ValueFrom: !Sub "${AppSecretArn}:APP_KEY::" }
            - { Name: ZEPTOMAIL_API_TOKEN, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_API_TOKEN::" }
            - { Name: ZEPTOMAIL_OTP_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_OTP_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_STUDENT_PASSWORD_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_STUDENT_PASSWORD_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_TEACHER_PASSWORD_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_TEACHER_PASSWORD_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_WELCOME_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_WELCOME_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_FEE_RECEIPT_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_FEE_RECEIPT_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_ANNOUNCEMENT_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_ANNOUNCEMENT_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_PASSWORD_CHANGED_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_PASSWORD_CHANGED_TEMPLATE_KEY::" }
            - { Name: ZEPTOMAIL_SCHOOL_CREATION_TEMPLATE_KEY, ValueFrom: !Sub "${AppSecretArn}:ZEPTOMAIL_SCHOOL_CREATION_TEMPLATE_KEY::" }
            - { Name: PHONEPE_CLIENT_ID, ValueFrom: !Sub "${AppSecretArn}:PHONEPE_CLIENT_ID::" }
            - { Name: PHONEPE_CLIENT_SECRET, ValueFrom: !Sub "${AppSecretArn}:PHONEPE_CLIENT_SECRET::" }
            - { Name: PHONEPE_WEBHOOK_USERNAME, ValueFrom: !Sub "${AppSecretArn}:PHONEPE_WEBHOOK_USERNAME::" }
            - { Name: PHONEPE_WEBHOOK_PASSWORD, ValueFrom: !Sub "${AppSecretArn}:PHONEPE_WEBHOOK_PASSWORD::" }
            # Firebase service-account JSON for server-side FCM (push notifications).
            # Set the key first: infra/secrets/set-firebase-credential.ps1
            - { Name: FIREBASE_CREDENTIALS, ValueFrom: !Sub "${AppSecretArn}:FIREBASE_CREDENTIALS::" }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: migrate

  # ── Services ──────────────────────────────────────────────────────────────
  WebService:
    Type: AWS::ECS::Service
    DependsOn: HttpListener
    Properties:
      ServiceName: superlms-web
      Cluster: !Ref Cluster
      TaskDefinition: !Ref WebTaskDef
      DesiredCount: !Ref WebDesiredCount
      LaunchType: FARGATE
      HealthCheckGracePeriodSeconds: 60
      DeploymentConfiguration:
        MinimumHealthyPercent: 100
        MaximumPercent: 200
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED   # public subnet + IGW = no NAT needed for ECR pull
          Subnets: !Split [",", !ImportValue superlms-public-subnets]
          SecurityGroups: [!ImportValue superlms-ecs-sg]
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroup
          ContainerName: web
          ContainerPort: 80

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: superlms-worker
      Cluster: !Ref Cluster
      TaskDefinition: !Ref WorkerTaskDef
      DesiredCount: 1
      CapacityProviderStrategy:
        - { CapacityProvider: FARGATE_SPOT, Weight: 1 }
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split [",", !ImportValue superlms-public-subnets]
          SecurityGroups: [!ImportValue superlms-ecs-sg]

  SchedulerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: superlms-scheduler
      Cluster: !Ref Cluster
      TaskDefinition: !Ref SchedulerTaskDef
      DesiredCount: 1
      LaunchType: FARGATE
      DeploymentConfiguration:
        MinimumHealthyPercent: 0
        MaximumPercent: 100
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          Subnets: !Split [",", !ImportValue superlms-public-subnets]
          SecurityGroups: [!ImportValue superlms-ecs-sg]

Outputs:
  AlbUrl:
    Description: Public URL of the app (until the custom domain in Phase 12)
    Value: !Sub ["http://${D}", { D: !GetAtt Alb.DNSName }]
  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Export: { Name: superlms-alb-dns }
  AlbZoneId:
    Value: !GetAtt Alb.CanonicalHostedZoneID
    Export: { Name: superlms-alb-zone-id }
  AlbFullName:
    Value: !GetAtt Alb.LoadBalancerFullName
    Export: { Name: superlms-alb-fullname }
  TgFullName:
    Value: !GetAtt TargetGroup.TargetGroupFullName
    Export: { Name: superlms-tg-fullname }
  ClusterName:
    Value: !Ref Cluster
    Export: { Name: superlms-ecs-cluster }
