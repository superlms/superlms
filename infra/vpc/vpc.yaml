AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  EdyOne LMS network (Phase 4). 2 AZ, NO NAT gateway (saves ~$32/mo).
  Public subnets host the ALB and the Fargate tasks (tasks get a public IP
  so they reach ECR/internet via the free Internet Gateway). Private
  subnets host RDS + ElastiCache, which need no internet access.
  Security groups chain ALB -> ECS -> RDS/Redis. Outputs are exported so
  later stacks (RDS, ElastiCache, ECS) can Fn::ImportValue them.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.0.0.0/16
  ContainerPort:
    Type: Number
    Default: 80
    Description: Port the web container (nginx) listens on; ALB -> ECS.

Resources:
  # ── VPC + Internet Gateway ──────────────────────────────────────────────
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{ Key: Name, Value: edyonelms-vpc }]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{ Key: Name, Value: edyonelms-igw }]

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  # ── Public subnets (ALB + Fargate tasks) ────────────────────────────────
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.0.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: edyonelms-public-a }]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags: [{ Key: Name, Value: edyonelms-public-b }]

  # ── Private subnets (RDS + ElastiCache) ─────────────────────────────────
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.10.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags: [{ Key: Name, Value: edyonelms-private-a }]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      Tags: [{ Key: Name, Value: edyonelms-private-b }]

  # ── Routing ─────────────────────────────────────────────────────────────
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: edyonelms-public-rt }]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  # Private route table has only the implicit local route — no internet path.
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: edyonelms-private-rt }]

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetA

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      SubnetId: !Ref PrivateSubnetB

  # ── Security groups (chain: internet -> ALB -> ECS -> RDS/Redis) ─────────
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB - public HTTP/HTTPS in
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - { IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }
        - { IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0 }
      Tags: [{ Key: Name, Value: edyonelms-alb-sg }]

  EcsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks - only the ALB may reach the container port
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: edyonelms-ecs-sg }]

  EcsIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsSg
      IpProtocol: tcp
      FromPort: !Ref ContainerPort
      ToPort: !Ref ContainerPort
      SourceSecurityGroupId: !Ref AlbSg

  RdsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS MySQL - only ECS tasks may connect
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: edyonelms-rds-sg }]

  RdsIngressFromEcs:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSg
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref EcsSg

  RedisSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ElastiCache Redis - only ECS tasks may connect
      VpcId: !Ref Vpc
      Tags: [{ Key: Name, Value: edyonelms-redis-sg }]

  RedisIngressFromEcs:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RedisSg
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref EcsSg

# ── Exports for later phases (RDS / ElastiCache / ECS) ────────────────────
Outputs:
  VpcId:
    Value: !Ref Vpc
    Export: { Name: edyonelms-vpc-id }
  PublicSubnets:
    Value: !Join [",", [!Ref PublicSubnetA, !Ref PublicSubnetB]]
    Export: { Name: edyonelms-public-subnets }
  PrivateSubnets:
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]
    Export: { Name: edyonelms-private-subnets }
  AlbSgId:
    Value: !Ref AlbSg
    Export: { Name: edyonelms-alb-sg }
  EcsSgId:
    Value: !Ref EcsSg
    Export: { Name: edyonelms-ecs-sg }
  RdsSgId:
    Value: !Ref RdsSg
    Export: { Name: edyonelms-rds-sg }
  RedisSgId:
    Value: !Ref RedisSg
    Export: { Name: edyonelms-redis-sg }
