AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  superlms cache (Phase 7). ElastiCache Redis, cache.t4g.micro, single node,
  in the private subnets, reachable only from the ECS security group. Used for
  cache + sessions + queue (CACHE_STORE / SESSION_DRIVER / QUEUE_CONNECTION =
  redis). No auth token - it is private and SG-restricted.

Parameters:
  NodeType:
    Type: String
    Default: cache.t4g.micro

Resources:
  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      Description: superlms private cache subnets
      SubnetIds: !Split [",", !ImportValue superlms-private-subnets]

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: superlms-redis
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: !Ref NodeType
      NumCacheNodes: 1
      Port: 6379
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:
        - !ImportValue superlms-redis-sg

Outputs:
  RedisHost:
    Value: !GetAtt RedisCluster.RedisEndpoint.Address
    Export: { Name: superlms-redis-host }
  RedisPort:
    Value: !GetAtt RedisCluster.RedisEndpoint.Port
    Export: { Name: superlms-redis-port }
