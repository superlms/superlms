x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: edyonelms/app:local
    container_name: edyonelms-app
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./:/var/www/html
      - vendor-data:/var/www/html/vendor
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      - ./public/build:/var/www/html/public/build
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - edyonelms

  nginx:
    image: nginx:1.27-alpine
    container_name: edyonelms-nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./public/build:/var/www/html/public/build:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
    depends_on:
      - app
    networks:
      - edyonelms

  mysql:
    image: mysql:8.0
    container_name: edyonelms-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edyonelms}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD:-rootsecret}}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD:-rootsecret}}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edyonelms

  redis:
    image: redis:7-alpine
    container_name: edyonelms-redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - edyonelms

volumes:
  mysql-data:
  redis-data:
  vendor-data:

networks:
  edyonelms:
    driver: bridge
