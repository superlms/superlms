x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Shared definition for every container that runs the app image.
# nginx now lives INSIDE the image (web role), so there is no separate
# nginx service. worker/scheduler reuse the same image with a different
# command — exactly like the ECS services will (Phase 10).
x-app: &app-base
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  image: edyonelms/app:local
  restart: unless-stopped
  logging: *default-logging
  env_file:
    - .env
  environment:
    DB_HOST: mysql
    DB_PORT: 3306
    REDIS_HOST: redis
    REDIS_PORT: 6379
  volumes:
    - ./:/var/www/html
    - vendor-data:/var/www/html/vendor
    - ./storage:/var/www/html/storage
    - ./bootstrap/cache:/var/www/html/bootstrap/cache
    - ./public/build:/var/www/html/public/build
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_started
  networks:
    - edyonelms

services:
  # WEB role — nginx + php-fpm in one container (default CMD = supervisord).
  web:
    <<: *app-base
    container_name: edyonelms-web
    ports:
      - "8080:80"

  # WORKER role — queue worker (on ECS this runs on Spot).
  # Only starts with `docker compose --profile workers up`.
  worker:
    <<: *app-base
    container_name: edyonelms-worker
    command: php artisan queue:work --tries=3 --timeout=120 --sleep=3 --max-jobs=1000 --max-time=3600
    profiles: ["workers"]

  # SCHEDULER role — exactly ONE instance, ever (no duplicate cron).
  scheduler:
    <<: *app-base
    container_name: edyonelms-scheduler
    command: php artisan schedule:work
    profiles: ["workers"]

  mysql:
    image: mysql:8.0
    container_name: edyonelms-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-edyonelms}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-${DB_PASSWORD:-rootsecret}}
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-p${DB_ROOT_PASSWORD:-${DB_PASSWORD:-rootsecret}}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - edyonelms

  redis:
    image: redis:7-alpine
    container_name: edyonelms-redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - edyonelms

volumes:
  mysql-data:
  redis-data:
  vendor-data:

networks:
  edyonelms:
    driver: bridge
