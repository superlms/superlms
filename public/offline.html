<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — SuperLMS</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc; color: #1f2937; padding: 24px;
        }
        .card { text-align: center; max-width: 360px; }
        img { width: 72px; height: 72px; object-fit: contain; margin-bottom: 16px; }
        h1 { font-size: 20px; margin: 0 0 8px; }
        p { font-size: 14px; color: #6b7280; margin: 0 0 20px; line-height: 1.5; }
        button {
            border: 0; background: #4f46e5; color: #fff; font-weight: 600; font-size: 14px;
            padding: 10px 20px; border-radius: 10px; cursor: pointer;
        }
        button:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/website-image/Logo.png" alt="SuperLMS">
        <h1>You're offline</h1>
        <p>SuperLMS needs an internet connection to load this page. Check your network and try again.</p>
        <button onclick="location.reload()">Retry</button>
    </div>
</body>
</html>
